name: M3U8 Download

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp

      - name: Get Duration From m3u8
        id: duration
        run: |
          URL="${{ github.event.inputs.link }}"
          
          echo "Getting duration from m3u8..."
          META=$(yt-dlp --dump-json "$URL")
          
          EXPECTED=$(echo "$META" | jq '.duration')
          
          echo "Expected duration: $EXPECTED seconds"
          echo "expected=$EXPECTED" >> $GITHUB_OUTPUT
      
      - name: Download + Verify + Duration Check (Retry 5 times)
        run: |
          URL="${{ github.event.inputs.link }}"
          EXPECTED=${{ steps.duration.outputs.expected }}

          MAX_RETRY=5
          COUNT=1

          while [ $COUNT -le $MAX_RETRY ]; do
            echo "=============================="
            echo "Attempt $COUNT / $MAX_RETRY"
            echo "=============================="

            rm -f input_video.mp4

            echo "Downloading..."
            yt-dlp \
            --concurrent-fragments 1 \
            --retries infinite \
            --fragment-retries 50 \
            --skip-unavailable-fragments \
            --retry-sleep fragment:10 \
            -o "input_video.mp4" \
            "$URL"

            if [ ! -f "input_video.mp4" ]; then
              echo "Download failed."
              COUNT=$((COUNT+1))
              continue
            fi

            echo "Checking video integrity..."
            if ! ffmpeg -v error -i input_video.mp4 -f null - 2>error.log; then
              echo "Video corrupted"
              cat error.log
              COUNT=$((COUNT+1))
              continue
            fi

            echo "Getting duration from file..."
            ACTUAL=$(ffprobe -v error \
              -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 \
              input_video.mp4)

            ACTUAL=${ACTUAL%.*}

            echo "Expected: $EXPECTED"
            echo "Actual: $ACTUAL"

            DIFF=$(echo "$EXPECTED $ACTUAL" | awk '{print ($1>$2)?$1-$2:$2-$1}')

            echo "Difference: $DIFF seconds"

            if [ "$DIFF" -le 3 ]; then
              echo "Duration OK"
              exit 0
            fi

            echo "Duration mismatch → retry download"
            COUNT=$((COUNT+1))
          done

          echo "Failed after $MAX_RETRY attempts"
          exit 1
          
      - name: Convert to HLS fMP4 (Segments as PNG)
        run: |
          mkdir -p output
          
          # Giải thích các tham số FFmpeg:
          # -map 0:v:0 -map 0:a? : Lấy video đầu tiên, lấy audio nếu có (không lỗi nếu ko có audio)
          # -c:v copy : Giữ nguyên bitrate/chất lượng video (không encode lại - cực nhanh)
          # -hls_fmp4_init_filename : Đặt tên file init (quan trọng nhất của fMP4) thành .png
          # -hls_segment_filename : Đặt tên các mảnh segment thành .png
          
          ffmpeg -i input_video.mp4 \
            -map 0:v:0 -map 0:a? \
            -c:v copy \
            -c:a aac -b:a 96k \
            -f hls \
            -start_number 10001 \
            -hls_time 5 \
            -hls_list_size 0 \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${{ github.event.inputs.slug }}-index.png" \
            -hls_segment_filename "output/${{ github.event.inputs.slug }}-index%d.png" \
            "output/${{ github.event.inputs.slug }}.m3u8"
          
          # Kiểm tra xem file m3u8 có được tạo không
          if [ ! -f "output/${{ github.event.inputs.slug }}.m3u8" ]; then
            echo "FFmpeg failed to create m3u8"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/vicdn.php" \
            --data-urlencode "type=ok0" \
            --data-urlencode "key=${{ github.event.inputs.page }}" \
            --data-urlencode "slug=${{ github.event.inputs.slug }}"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry – reuse encoded files)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
