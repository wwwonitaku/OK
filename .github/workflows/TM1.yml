name: M3U8 -> Audio (Strict TTS Overlay)

on:
  workflow_dispatch:
    inputs:
      link: { description: "Link", required: true }
      slug: { description: "Slug", required: true }
      token: { description: 'Token', required: true }
      page: { description: 'Page', required: true }
      account: { description: 'AID', required: true }

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl jq unzip python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install -U yt-dlp webvtt-py requests edge-tts

      - name: Download Video & Subtitle
        run: |
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            -o "raw_video.mp4" \
            "${{ github.event.inputs.link }}"
          
          curl -L "https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt" -o vi.vtt

      - name: AI TTS Generation
        run: |
          python3 <<'EOF'
          import webvtt, os, asyncio, edge_tts, re, subprocess

          async def generate_tts(text, out, idx, semaphore):
              async with semaphore:
                  try:
                      t = re.sub(r'\s+', ' ', text).strip()
                      if not t: t = "."
                      tts = edge_tts.Communicate(t, voice="vi-VN-HoaiMyNeural", rate="+28%")
                      await tts.save(out)
                  except:
                      # Tạo file im lặng nếu lỗi để không làm lệch trình tự
                      subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          async def main():
            if not os.path.exists("vi.vtt"): return
            vtt = webvtt.read("vi.vtt")
            os.makedirs("chunks", exist_ok=True)
            semaphore = asyncio.Semaphore(15)
            tasks = [generate_tts(c.text, f"chunks/c_{i:05d}.mp3", i, semaphore) for i, c in enumerate(vtt)]
            await asyncio.gather(*tasks)
          
          asyncio.run(main())
          EOF

      - name: Create TTS Layer (Batch 100 - No BG Processing)
        run: |
          python3 <<'EOF'
          import webvtt, subprocess, os

          vtt = webvtt.read("vi.vtt")
          batch_size = 100
          partial_files = []

          # Bước 1: Trộn các câu TTS thành các file wav tạm (đúng timeline)
          for b_idx in range(0, len(vtt), batch_size):
              batch = vtt[b_idx : b_idx + batch_size]
              inputs = []
              filter_parts = []
              
              for i, c in enumerate(batch):
                  h, m, s = c.start.replace(',', '.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000)
                  
                  real_idx = b_idx + i
                  audio_file = f"chunks/c_{real_idx:05d}.mp3"
                  
                  if os.path.exists(audio_file):
                      inputs.extend(["-i", audio_file])
                      idx_in_batch = len(inputs) - 1
                      # adelay đặt TTS vào đúng mili giây của timeline
                      filter_parts.append(f"[{idx_in_batch}:a]adelay={ms}|{ms}[a{idx_in_batch}];")
              
              if inputs:
                  mix_tags = "".join([f"[a{k}]" for k in range(len(inputs))])
                  # normalize=0 để giữ nguyên âm lượng gốc của TTS
                  filter_script = "".join(filter_parts) + f"{mix_tags}amix=inputs={len(inputs)}:normalize=0[out]"
                  
                  out_name = f"tts_layer_{b_idx}.wav"
                  subprocess.run(["ffmpeg", "-y"] + inputs + ["-filter_complex", filter_script, "-map", "[out]", out_name], check=True)
                  partial_files.append(out_name)

          # Bước 2: Hợp nhất các lớp TTS thành 1 file duy nhất
          if partial_files:
              final_inputs = []
              for p in partial_files:
                  final_inputs.extend(["-i", p])
              
              mix_batches_tags = "".join([f"[{j}:a]" for j in range(len(partial_files))])
              final_filter = f"{mix_batches_tags}amix=inputs={len(partial_files)}:normalize=0[tts_final]"
              
              subprocess.run(["ffmpeg", "-y"] + final_inputs + ["-filter_complex", final_filter, "-map", "[tts_final]", "all_tts.wav"], check=True)
          EOF

      - name: Final Audio Overlay & Remux
        run: |
          # Trộn all_tts.wav đè lên audio gốc của raw_video.mp4
          # Giữ nguyên chất lượng video gốc (copy)
          # amix trộn 2 luồng audio (gốc phim + tts)
          ffmpeg -y -i raw_video.mp4 -i all_tts.wav \
            -filter_complex "[0:a][1:a]amix=inputs=2:duration=first:dropout_transition=0,volume=2.0[out_a]" \
            -map 0:v:0 -map "[out_a]" \
            -c:v copy -c:a aac -b:a 128k -shortest final.mp4

      - name: Generate HLS
        run: |
          mkdir -p output
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${{ github.event.inputs.slug }}-index.png" \
            -hls_segment_filename "output/${{ github.event.inputs.slug }}-index%d.png" \
            "output/${{ github.event.inputs.slug }}.m3u8"
          cp vi.vtt output/

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          BASE_URL="https://${BRANCH}.${PROJECT}.pages.dev"
          FILE_URL="${BASE_URL}/${BRANCH}.m3u8"
          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            [ "$code" = "200" ]
          }
          sleep 60
          check || (sleep 180 && check) || (echo "NEED_REDEPLOY=true" >> $GITHUB_ENV && exit 1)

      - name: Deploy to Cloudflare Pages 2
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
