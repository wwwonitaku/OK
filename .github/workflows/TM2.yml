name: Thuyết Minh (Nam)
on:
  workflow_dispatch:
    inputs:
      link: { description: "Link", required: true }
      slug: { description: "Slug", required: true }
      token: { description: 'Token', required: true }
      page: { description: 'Page', required: true }
      account: { description: 'AID', required: true }
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl jq unzip python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install -U yt-dlp webvtt-py requests edge-tts
          # Tăng giới hạn mở file để xử lý hàng ngàn file mp3 cho video dài
          ulimit -n 4096

      - name: Download Video & Subtitle
        run: |
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            -o "raw_video.mp4" \
            "${{ github.event.inputs.link }}"
          
          # Tải phụ đề Việt
          curl -L "https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt" -o vi.vtt

      - name: Filter Music from Subtitle
        run: |
          python3 -c '
          import webvtt
          import os
          if os.path.exists("vi.vtt"):
              vtt = webvtt.read("vi.vtt")
              # Lọc: chỉ giữ lại những dòng KHÔNG chứa ký tự nhạc ♪
              vtt.captions = [c for c in vtt if "♪" not in c.text]
              vtt.save("vi.vtt")
              print(f"Filtered VTT: remaining {len(vtt.captions)} captions.")
          '

      - name: TTS Generation (From Downloaded Sub)
        run: |
          python3 <<'EOF'
          import webvtt, os, re, asyncio, edge_tts, subprocess
          MAX_CONCURRENT_TTS = 10
          def normalize_for_tts(text):
              text = text.lower()
              text = re.sub(r'<[^>]+>', '', text) # Xóa tag HTML
              text = re.sub(r'\s+', ' ', text).strip()
              text = text.replace('"', '')
              text = text.replace(",", ", ").replace(".", ". ")
              if not text.endswith((".", "!", "?", "...")): text += "."
              return text
          async def generate_tts(text, out, idx, semaphore):
              async with semaphore:
                  try:
                      tts_text = normalize_for_tts(text)
                      if not tts_text or tts_text == ".": 
                          raise Exception("Empty text")
                      tts = edge_tts.Communicate(tts_text, voice="vi-VN-NamMinhNeural", rate="+32%")
                      await tts.save(out)
                      # Khử khoảng lặng để tránh cộng dồn nhiễu và lệch timeline
                      tmp_out = out + ".tmp.mp3"
                      subprocess.run(["ffmpeg", "-y", "-i", out, "-af", "silenceremove=start_periods=1:start_duration=0:start_threshold=-50dB:stop_periods=-1:stop_threshold=-50dB:stop_duration=0", tmp_out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                      os.rename(tmp_out, out)
                  except:
                      # Tạo file lặng 0.1s nếu lỗi để không làm hỏng filter_complex
                      subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          async def main():
            if not os.path.exists("vi.vtt"):
                print("Missing vi.vtt"); return
            vtt = webvtt.read("vi.vtt")
            os.makedirs("chunks", exist_ok=True)
            semaphore = asyncio.Semaphore(MAX_CONCURRENT_TTS)
            tasks = []
            for i, c in enumerate(vtt):
                tasks.append(generate_tts(c.text, f"chunks/c_{i}.mp3", i, semaphore))
            await asyncio.gather(*tasks)
            with open("count.txt", "w") as f: f.write(str(len(vtt)))
            print(f"[DONE] Generated {len(vtt)} TTS chunks")
          asyncio.run(main())
          EOF

      - name: Build Audio Filter
        run: |
          # Lấy thông số video
          VIDEO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 raw_video.mp4)
          AUDIO_RATE=$(ffprobe -v error -select_streams a:0 -show_entries stream=sample_rate -of default=noprint_wrappers=1:nokey=1 raw_video.mp4)
          echo "audio_rate=$AUDIO_RATE" >> $GITHUB_ENV
          
          python3 <<EOF
          import webvtt, os, subprocess
          def to_ms(time_str):
              h, m, s = time_str.replace(',', '.').split(':')
              return int(float(h)*3600000 + float(m)*60000 + float(s)*1000)
          def get_duration(file):
              cmd = ["ffprobe", "-v", "error", "-show_entries", "format=duration", "-of", "default=noprint_wrappers=1:nokey=1", file]
              return float(subprocess.check_output(cmd))
          
          vtt = webvtt.read("vi.vtt")
          filters = []
          mix_labels = ""
          audio_rate = os.environ.get('audio_rate', '44100')
          v_dur_ms = int(float("$VIDEO_DURATION") * 1000)
          
          for i, c in enumerate(vtt):
              start_ms = to_ms(c.start)
              delay_ms = start_ms
              if i < len(vtt) - 1:
                  next_start_ms = to_ms(vtt[i+1].start)
                  max_duration_ms = next_start_ms - start_ms - 50
              else:
                  max_duration_ms = v_dur_ms - start_ms - 50
              
              max_duration_ms = max(500, max_duration_ms)
              max_duration_sec = max_duration_ms / 1000.0
              orig_duration_sec = get_duration(f"chunks/c_{i}.mp3")
              
              atempo_str = ""
              if orig_duration_sec > max_duration_sec + 0.001:
                  speed = orig_duration_sec / max_duration_sec
                  if speed > 2.0:
                      atempo_str = f"atempo=2.0,atempo={speed/2.0:.6f},"
                  else:
                      atempo_str = f"atempo={speed:.6f},"
              
              # adelay=X|X để hỗ trợ âm thanh stereo cho cả 2 kênh
              filters.append(
                  f"[{i+1}:a]{atempo_str}aresample={audio_rate},adelay={delay_ms}|{delay_ms}[a{i}]"
              )
              mix_labels += f"[a{i}]"
              
          with open("audio_filter.txt", "w") as f:
              f.write(";".join(filters) + ";")
              # CHÌA KHÓA: normalize=0 giúp giữ nguyên âm lượng gốc, không bị rè do nhân chia
              f.write(f"{mix_labels}amix=inputs={len(vtt)}:normalize=0[tts_raw];")
              # Áp dụng volume 3.0 cho TTS và 0.9 cho nhạc nền
              f.write(f"[tts_raw]volume=3.0[tts];")
              f.write(f"[0:a]volume=0.9[bg];[bg][tts]amix=inputs=2:normalize=0[out_audio]")
          EOF

      - name: Render Video (Stream Copy) & HLS
        run: |
          COUNT=$(cat count.txt)
          # Xử lý hàng ngàn file input cho video 3 tiếng bằng danh sách tạm
          printf -- "-i\nraw_video.mp4\n" > inputs_list.txt
          for ((i=0; i<COUNT; i++)); do
            printf -- "-i\nchunks/c_$i.mp3\n" >> inputs_list.txt
          done

          ffmpeg -y $(cat inputs_list.txt) -filter_complex_script audio_filter.txt \
            -map 0:v -map "[out_audio]" \
            -c:v copy \
            -c:a aac -ar ${{ env.audio_rate }} -b:a 128k -threads 0 final.mp4

          mkdir -p output
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${{ github.event.inputs.slug }}-index.png" \
            -hls_segment_filename "output/${{ github.event.inputs.slug }}-index%d.png" \
            "output/${{ github.event.inputs.slug }}.m3u8"

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          BASE_URL="https://${BRANCH}.${PROJECT}.pages.dev"
          FILE_URL="${BASE_URL}/${BRANCH}.m3u8"
          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            [ "$code" = "200" ]
          }
          sleep 60
          check || (sleep 180 && check) || (echo "NEED_REDEPLOY=true" >> $GITHUB_ENV && exit 1)

      - name: Deploy to Cloudflare Pages 2
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
