name: M3U8 ->> Audio

on:
  workflow_dispatch:
    inputs:
      link: { description: "Link", required: true }
      slug: { description: "Slug", required: true }
      token: { description: 'Token', required: true }
      page: { description: 'Page', required: true }
      account: { description: 'AID', required: true }

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          sudo apt update
          sudo apt install -y ffmpeg curl jq unzip fontconfig python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install -U yt-dlp webvtt-py requests edge-tts

      - name: Setup Subtitle Font (Oswald)
        run: |
          mkdir -p fonts
          curl -L https://github.com/wwwonitaku/Linux/raw/main/UVNHongHaHep_B.TTF -o fonts/UVNHongHaHep_B.TTF
          fc-cache -f fonts

      - name: Download Video & Subtitle
        run: |
          # Tải video gốc
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            --retry-sleep 5 \
            -o "raw_video.mp4" \
            "${{ github.event.inputs.link }}"
          
          # Tải sub Việt (Mặc định đã có sẵn trên server)
          curl -L "https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt" -o vi.vtt
          ffmpeg -i raw_video.mp4 -vn -ac 2 bg_audio.wav
      - name: AI Translate + TTS (Fixed Stability)
        run: |
          python3 <<'EOF'
          import webvtt, os, time, re, asyncio, edge_tts, subprocess

          async def generate_tts(text, out, idx, semaphore):
              async with semaphore:
                  try:
                      # Giữ nguyên normalize và rate +28% của code gốc
                      t = text.lower()
                      t = re.sub(r'\s+', ' ', t).strip()
                      t = t.replace(",", ", ").replace(".", ". ").replace("?", "? ").replace("!", "! ")
                      if not t.endswith((".", "!", "?", "...")): t += "."
                      
                      tts = edge_tts.Communicate(t, voice="vi-VN-HoaiMyNeural", rate="+28%")
                      await tts.save(out)
                      print(f"[TTS OK] #{idx:05d}") # Index dạng 00001
                  except:
                      # Nếu lỗi tạo file lặng để ko lệch timeline
                      subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          async def main():
            if not os.path.exists("vi.vtt"): return
            vtt = webvtt.read("vi.vtt")
            os.makedirs("chunks", exist_ok=True)
            semaphore = asyncio.Semaphore(5)
            tasks = []
            for i, c in enumerate(vtt):
                # Lưu file dạng c_00000.mp3 để sắp xếp chuẩn
                tasks.append(generate_tts(c.text, f"chunks/c_{i:05d}.mp3", i, semaphore))
            await asyncio.gather(*tasks)
            with open("count.txt", "w") as f: f.write(str(len(vtt)))

          asyncio.run(main())
          EOF

      - name: Separate Audio Processing (Batches of 500)
        run: |
          python3 <<'EOF'
          import webvtt, subprocess, os

          vtt = webvtt.read("vi.vtt")
          total = len(vtt)
          batch_size = 100
          batch_files = []

          for b in range(0, total, batch_size):
              batch_idx = b // batch_size
              current_batch = vtt[b : b + batch_size]
              
              inputs = []
              filter_parts = []
              
              for i, c in enumerate(current_batch):
                  idx = b + i
                  # Chuyển timeline VTT sang ms chính xác
                  h, m, s = c.start.replace(',', '.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                  
                  inputs.extend(["-i", f"chunks/c_{idx:05d}.mp3"])
                  filter_parts.append(f"[{i}:a]adelay={ms}|{ms}[a{i}];")
              
              filter_str = "".join(filter_parts)
              filter_str += "".join(f"[a{i}]" for i in range(len(current_batch)))
              filter_str += f"amix=inputs={len(current_batch)}:normalize=0,volume=3.0[out]"
              
              out_name = f"batch_{batch_idx}.wav"
              subprocess.run(["ffmpeg", "-y"] + inputs + ["-filter_complex", filter_str, "-map", "[out]", out_name])
              batch_files.append(out_name)

          # Trộn các batch và mix vào nhạc nền video gốc
          final_mix_filter = "".join(f"[{i+1}:a]" for i in range(len(batch_files)))
          final_mix_filter += f"amix=inputs={len(batch_files)}:normalize=0[tts];"
          final_mix_filter += "[0:a]volume=0.90[bg];[bg][tts]amix=inputs=2[out_a]"
          
          cmd = ["ffmpeg", "-y", "-i", "bg_audio.wav"]
          for bf in batch_files: cmd.extend(["-i", bf])
          cmd.extend(["-filter_complex", final_mix_filter, "-map", "[out_a]", "-c:a", "aac", "-b:a", "96k", "final_audio.aac"])
          subprocess.run(cmd)
          EOF

      - name: Render Video Hardsub (Perfect 5s)
        run: |
          # Ép -r 24 và -g 120 để đảm bảo keyframe đúng mỗi 5 giây (24*5=120)
          ffmpeg -y -i raw_video.mp4 -i final_audio.aac \
            -vf "subtitles=vi.vtt:fontsdir=fonts:force_style='FontName=UVN Hong Ha Hep,PrimaryColour=&H00FFFF&,FontSize=30,Outline=0.4,Shadow=0.4'" \
            -map 0:v -map 1:a \
            -c:v libx264 -crf 23 -preset medium -r 24 \
            -x264-params "keyint=120:min-keyint=120:scenecut=0" \
            -pix_fmt yuv420p -maxrate 2000k -bufsize 3000k \
            -c:a copy -threads 0 final.mp4

      - name: Generate HLS
        run: |
          mkdir -p output
          # Dùng copy vì video đã được force keyframe chuẩn ở bước trên
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${{ github.event.inputs.slug }}-index.png" \
            -hls_segment_filename "output/${{ github.event.inputs.slug }}-index%d.png" \
            "output/${{ github.event.inputs.slug }}.m3u8"
          cp vi.vtt output/

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          BASE_URL="https://${BRANCH}.${PROJECT}.pages.dev"
          FILE_URL="${BASE_URL}/${BRANCH}.m3u8"
          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            [ "$code" = "200" ]
          }
          sleep 60
          if check; then exit 0; fi
          sleep 180
          if check; then exit 0; fi
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages 2
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
