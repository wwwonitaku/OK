name: M3U8 Download ->> Audio

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp webvtt-py edge-tts requests
          
      - name: Download Video from m3u8 Link
        run: |
          last=0
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            --retry-sleep 5 \
            --newline \
            -o "raw_video.mp4" \
            "${{ github.event.inputs.link }}" | while IFS= read -r line; do
              now=$(date +%s)
              if [ $((now - last)) -ge 10 ]; then
                echo "$line"
                last=$now
              fi
            done

      - name: Setup Subtitle Font
        run: |
          mkdir -p fonts
          curl -L https://github.com/wwwonitaku/Linux/raw/main/UVNHongHaHep_B.TTF -o fonts/UVNHongHaHep_B.TTF
          fc-cache -f fonts

      - name: Download Vietnamese Subtitle
        run: |
          CHECK_URL="https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt"
          if curl -L --fail "$CHECK_URL" -o vi_downloaded.vtt; then
            echo "[INFO] Downloaded successfully."
          else
            echo "[ERROR] Vietnamese sub not found on server!"
            exit 1
          fi

      - name: TTS Generation
        run: |
          python3 <<'EOF'
          import webvtt, os, time, re, requests, asyncio, edge_tts, subprocess

          MAX_CONCURRENT_TTS = 5 

          def safe_text(text, max_len=450):
              if not text: return "..."
              text = re.sub(r'\s+', ' ', text).strip()
              return text if len(text) <= max_len else text[:max_len] + "..."

          def normalize_for_tts(text):
              text = text.lower()
              text = re.sub(r'\s+', ' ', text).strip()
              text = text.replace(",", ", ").replace(".", ". ").replace("?", "? ").replace("!", "! ")
              if not text.endswith((".", "!", "?", "...")): text += "."
              return text

          async def generate_tts(text, out, idx, semaphore):
              async with semaphore:
                  try:
                      tts_text = normalize_for_tts(text)
                      tts = edge_tts.Communicate(tts_text, voice="vi-VN-HoaiMyNeural", rate="+28%")
                      await tts.save(out)
                      if not os.path.exists(out) or os.path.getsize(out) < 100: raise Exception("Fail")
                  except:
                      await asyncio.sleep(2)
                      try:
                          tts = edge_tts.Communicate(normalize_for_tts(text), voice="vi-VN-HoaiMyNeural", rate="+28%")
                          await tts.save(out)
                      except:
                          subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          async def main():
            final_vtt = webvtt.read("vi_downloaded.vtt")
            os.makedirs("chunks", exist_ok=True)
            vi_vtt_to_save = webvtt.WebVTT()
            semaphore = asyncio.Semaphore(MAX_CONCURRENT_TTS)
            tasks = []
            for i, c in enumerate(final_vtt):
                txt = safe_text(c.text)
                vi_vtt_to_save.captions.append(webvtt.Caption(c.start, c.end, txt))
                tasks.append(generate_tts(txt, f"chunks/c_{i}.mp3", i, semaphore))
            await asyncio.gather(*tasks)
            vi_vtt_to_save.save("vi.vtt")
            with open("count.txt", "w") as f: f.write(str(len(final_vtt)))
          asyncio.run(main())
          EOF

      - name: Build Filter Scripts
        run: |
          python3 <<EOF
          import webvtt
          vtt = webvtt.read("vi.vtt")
          
          # 1. Filter để gộp các mảnh audio (không chứa video)
          with open("audio_merge.txt", "w") as f:
              for i, c in enumerate(vtt):
                  h, m, s = c.start.replace(',', '.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                  f.write(f"[{i}:a]adelay={ms}|{ms}[a{i}];")
              f.write("".join(f"[a{i}]" for i in range(len(vtt))))
              f.write(f"amix=inputs={len(vtt)}:normalize=0[out]")

          # 2. Filter để render video cuối cùng (chỉ trộn audio master + sub)
          with open("video_final.txt", "w") as f:
              f.write("[0:a]volume=0.90[bg];[1:a]volume=3.0[tts];[bg][tts]amix=inputs=2[out_audio];")
              f.write("[0:v]subtitles=vi.vtt:fontsdir=fonts:force_style='FontName=UVN Hong Ha Hep,PrimaryColour=&H00FFFF&,FontSize=33,Outline=0.4,Shadow=0.4'[out_video]")
          EOF

      - name: Master Audio Merging
        run: |
          COUNT=$(cat count.txt)
          INPUTS=""
          for ((i=0; i<COUNT; i++)); do
            INPUTS="$INPUTS -i chunks/c_$i.mp3"
          done
          # Gộp hàng nghìn mảnh MP3 thành 1 file duy nhất
          ffmpeg -y $INPUTS -filter_complex_script audio_merge.txt -map "[out]" -c:a libmp3lame -b:a 128k tts_master.mp3

      - name: Render & HLS
        run: |
          NAME="${{ github.event.inputs.slug }}"
          # Render video với duy nhất 2 input: Video gốc và Audio đã gộp
          ffmpeg -y -i raw_video.mp4 -i tts_master.mp3 -filter_complex_script video_final.txt \
            -map "[out_video]" -map "[out_audio]" \
            -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 -crf 23 -preset medium \
            -maxrate 2000k -bufsize 3000k \
            -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 \
            -vsync cfr -c:a aac -b:a 96k -ac 2 -threads 0 -movflags +faststart final.mp4

          mkdir -p output
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-index.png" \
            -hls_segment_filename "output/${NAME}-index%d.png" \
            "output/${NAME}.m3u8"

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          BASE_URL="https://${BRANCH}.${PROJECT}.pages.dev"
          FILE_URL="${BASE_URL}/${BRANCH}.m3u8"
          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            [ "$code" = "200" ]
          }
          sleep 60
          if check; then exit 0; fi
          sleep 180
          if check; then exit 0; fi
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages 2
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
