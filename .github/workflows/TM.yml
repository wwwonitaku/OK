name: M3U8 Download Multi-Audio

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp webvtt-py requests edge-tts

      - name: Download Video and Subtitle
        run: |
          echo "Starting Download..."
          # Tải video raw với log 1 dòng
          yt-dlp --newline --progress --no-warnings \
            --hls-prefer-native --concurrent-fragments 10 \
            --retries infinite --fragment-retries infinite --retry-sleep 5 \
            -o "input_video.mp4" "${{ github.event.inputs.link }}" | python3 -c "
          import sys, re
          for line in sys.stdin:
              m = re.search(r'\[download\]\s+(\d+\.\d+%) of\s+([\d\.]+\w+)', line)
              if m:
                  sys.stdout.write(f'\r[Download Progress]: {m.group(1)} | Total: {m.group(2)}')
                  sys.stdout.flush()
          "
          echo -e "\nDownload Video Completed."
          
          # Tải vietsub
          curl -L "https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt" -o "vi.vtt"
          echo "Subtitle Downloaded."

      - name: Step 1 - Process TTS (AI Voices)
        run: |
          echo "Generating AI Voices (Male & Female)..."
          python3 <<EOF
          import asyncio, edge_tts, webvtt, os, re, subprocess

          def normalize_for_tts(text):
              text = text.lower().strip()
              text = re.sub(r'\s+', ' ', text)
              text = text.replace(",", ", ").replace(".", ". ").replace("?", "? ").replace("!", "! ")
              if not text.endswith((".", "!", "?", "...")): text += "."
              return text

          async def generate_tts(text, out, voice, semaphore, idx, total):
              async with semaphore:
                  try:
                      await edge_tts.Communicate(normalize_for_tts(text), voice=voice, rate="+28%").save(out)
                  except:
                      subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  if idx % 10 == 0 or idx == total:
                      print(f"\r[TTS Progress]: {idx}/{total} chunks", end="", flush=True)

          async def main():
              vtt = webvtt.read("vi.vtt")
              sem = asyncio.Semaphore(15)
              for gender, voice in [("male", "vi-VN-NamMinhNeural"), ("female", "vi-VN-HoaiMyNeural")]:
                  print(f"\nProcessing {gender} voice...")
                  os.makedirs(f"chunks_{gender}", exist_ok=True)
                  tasks = [generate_tts(c.text, f"chunks_{gender}/c_{i}.mp3", voice, sem, i+1, len(vtt)) for i, c in enumerate(vtt)]
                  await asyncio.gather(*tasks)

          asyncio.run(main())
          EOF
          echo -e "\nTTS Generation Completed."

      - name: Step 2 - Mix and Create Audio HLS (A0, A1, A2)
        run: |
          echo "Mixing Audio and Segmenting to HLS PNG..."
          mkdir -p output
          NAME="${{ github.event.inputs.slug }}"
          
          # Trích xuất audio gốc 128k
          ffmpeg -i input_video.mp4 -vn -acodec aac -b:a 96k original_audio.aac -loglevel error

          # Tạo script mix dựa trên logic của bạn
          python3 <<EOF
          import webvtt
          vtt = webvtt.read("vi.vtt")
          for gender in ["male", "female"]:
              with open(f"mix_{gender}.sh", "w") as f:
                  inputs = ""
                  mix_filter = ""
                  for i, c in enumerate(vtt):
                      h, m, s = c.start.replace(',', '.').split(':')
                      ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                      inputs += f" -i chunks_{gender}/c_{i}.mp3"
                      mix_filter += f"[{i+1}:a]adelay={ms}|{ms}[a{i}];"
                  
                  mix_filter += "".join(f"[a{i}]" for i in range(len(vtt)))
                  mix_filter += f"amix=inputs={len(vtt)}:normalize=0,volume=3.0[tts];"
                  mix_filter += f"[0:a]volume=0.9[bg];[bg][tts]amix=inputs=2[out_audio]"
                  f.write(f"ffmpeg -y -i original_audio.aac {inputs} -filter_complex \"{mix_filter}\" -map \"[out_audio]\" -c:a aac -b:a 96k mixed_{gender}.aac -loglevel error")
          EOF

          bash mix_male.sh
          bash mix_female.sh

          # Chuyển thành HLS fMP4 PNG (A0: Gốc, A1: Nam, A2: Nữ)
          for type in a0 a1 a2; do
            FILE="original_audio.aac"; [ "$type" == "a1" ] && FILE="mixed_male.aac"; [ "$type" == "a2" ] && FILE="mixed_female.aac"
            ffmpeg -i $FILE -c copy -f hls -hls_time 60 -hls_list_size 0 \
              -hls_segment_type fmp4 -hls_fmp4_init_filename "${NAME}-${type}-index.png" \
              -hls_segment_filename "output/${NAME}-${type}-index%d.png" "output/${NAME}-${type}.m3u8" -loglevel error
          done
          echo "Audio Playlists Created."

      - name: Step 3 - Encode Video Raw and Create HLS
        run: |
          echo "Encoding Video (Raw) with log 1 dòng..."
          NAME="${{ github.event.inputs.slug }}"
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 input_video.mp4)
          
          # Encode Video theo đúng code gốc của bạn (loại bỏ audio, thêm -an)
          ffmpeg -y -progress pipe:1 -i input_video.mp4 \
            -vf "scale='if(gt(iw,1920),1920,if(gt(ih,1080),-2,iw))':'if(gt(ih,1080),1080,if(gt(iw,1920),-2,ih))',format=yuv420p" \
            -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 -crf 23 -preset medium \
            -maxrate 2000k -bufsize 3000k \
            -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 \
            -vsync cfr -an -threads 0 -movflags +faststart \
            final.mp4 2>/dev/null | python3 -c "
          import sys
          duration = float('$DURATION') * 1000000
          for line in sys.stdin:
              if 'out_time_ms' in line:
                  time = int(line.split('=')[1])
                  sys.stdout.write(f'\r[Encode Progress]: {min(100, (time/duration)*100):.2f}%')
                  sys.stdout.flush()
          "
          echo -e "\nVideo Encoding Completed."

          # Chuyển video sang HLS fMP4 PNG
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 \
            -start_number 10001 \
            -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-v-index.png" \
            -hls_segment_filename "output/${NAME}-v-index%d.png" \
            "output/${NAME}-v.m3u8" -loglevel error

          # Tạo Master Playlist tổng hợp
          cat <<EOF > output/${{ github.event.inputs.slug }}.m3u8
          #EXTM3U
          #EXT-X-VERSION:4
          #EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Tiếng gốc",DEFAULT=YES,AUTOSELECT=YES,URI="$NAME-a0.m3u8"
          #EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Thuyết minh Nam",DEFAULT=NO,AUTOSELECT=YES,URI="$NAME-a1.m3u8"
          #EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Thuyết minh Nữ",DEFAULT=NO,AUTOSELECT=YES,URI="$NAME-a2.m3u8"
          #EXT-X-STREAM-INF:BANDWIDTH=2000000,RESOLUTION=1920x1080,AUDIO="audio"
          $NAME-v.m3u8
          EOF
          echo "All Playlists Generated."

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"
          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry – reuse encoded files)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
