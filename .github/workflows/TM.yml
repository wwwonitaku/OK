name: M3U8 Download ->> Audio

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp
          
      - name: Download Video from m3u8 Link
        run: |
          last=0
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            --retry-sleep 5 \
            --newline \
            -o "input_video.mp4" \
            "${{ github.event.inputs.link }}" | while IFS= read -r line; do
              now=$(date +%s)
              if [ $((now - last)) -ge 20 ]; then
                echo "$line"
                last=$now
              fi
            done

      - name: Setup Subtitle Font (Oswald)
        run: |
          mkdir -p fonts
          curl -L https://github.com/wwwonitaku/Linux/raw/main/Oswald.zip -o Oswald.zip
          unzip -o Oswald.zip -d fonts
          fc-cache -f fonts

      - name: Download Vietnamese Subtitle
        run: |
          # Tải sub Việt từ server về với tên vi_downloaded.vtt
          CHECK_URL="https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt"
          echo "[INFO] Downloading sub from: $CHECK_URL"
          
          if curl -L --fail "$CHECK_URL" -o vi_downloaded.vtt; then
            echo "[INFO] Downloaded successfully."
          else
            echo "[ERROR] Vietnamese sub not found on server!"
            exit 1
          fi

      - name: TTS Generation (From downloaded sub)
        run: |
          python3 <<'EOF'
          import webvtt, os, time, re, requests, asyncio, edge_tts, subprocess

          MAX_CONCURRENT_TTS = 5 

          def safe_text(text, max_len=450):
              if not text: return "..."
              text = re.sub(r'\s+', ' ', text).strip()
              return text if len(text) <= max_len else text[:max_len] + "..."

          def normalize_for_tts(text):
              # Chuyển thành chữ thường và làm sạch văn bản cho TTS
              text = text.lower()
              text = re.sub(r'\s+', ' ', text).strip()
              text = text.replace(",", ", ").replace(".", ". ").replace("?", "? ").replace("!", "! ")
              text = text.replace("…", " ... ").replace("—", " ... ")
              if not text.endswith((".", "!", "?", "...")): text += "."
              return text

          async def generate_tts(text, out, idx, semaphore):
              async with semaphore:
                  try:
                      tts_text = normalize_for_tts(text)
                      tts = edge_tts.Communicate(tts_text, voice="vi-VN-HoaiMyNeural", rate="+28%")
                      await tts.save(out)
                      if not os.path.exists(out) or os.path.getsize(out) < 100: raise Exception("Fail")
                      print(f"[TTS OK] #{idx}")
                  except:
                      print(f"[TTS RETRY] #{idx}")
                      await asyncio.sleep(2)
                      try:
                          tts = edge_tts.Communicate(normalize_for_tts(text), voice="vi-VN-HoaiMyNeural", rate="+28%")
                          await tts.save(out)
                      except:
                          # Tạo file lặng nếu TTS thất bại hoàn toàn
                          subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          async def main():
            if not os.path.exists("vi_downloaded.vtt"):
                print("[FATAL] vi_downloaded.vtt not found!")
                raise SystemExit(1)

            print("[INFO] Loading Vietnamese subtitle for TTS...")
            final_vtt = webvtt.read("vi_downloaded.vtt")
            
            os.makedirs("chunks", exist_ok=True)
            vi_vtt_to_save = webvtt.WebVTT()
            semaphore = asyncio.Semaphore(MAX_CONCURRENT_TTS)
            tasks = []
        
            for i, c in enumerate(final_vtt):
                txt = safe_text(c.text)
                # Lưu lại caption vào file vi.vtt mới (để đồng bộ với logic build filter)
                vi_vtt_to_save.captions.append(webvtt.Caption(c.start, c.end, txt))
                tasks.append(generate_tts(txt, f"chunks/c_{i}.mp3", i, semaphore))
        
            await asyncio.gather(*tasks)
            vi_vtt_to_save.save("vi.vtt")
        
            with open("count.txt", "w") as f:
                f.write(str(len(final_vtt)))
            print(f"[DONE] TTS completed for {len(final_vtt)} segments")

          asyncio.run(main())
          EOF

      - name: Build Filter
        run: |
          python3 <<EOF
          import webvtt
          # Đọc file vi.vtt vừa tạo từ bước trên
          vtt = webvtt.read("vi.vtt")
          with open("master_filter.txt","w") as f:
              for i,c in enumerate(vtt):
                  h,m,s = c.start.replace(',','.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                  f.write(f"[{i+1}:a]adelay={ms}|{ms}[a{i}];")
              f.write("".join(f"[a{i}]" for i in range(len(vtt))))
              f.write(f"amix=inputs={len(vtt)}:normalize=0,volume=3.0[tts];")
              f.write("[0:a]volume=0.90[bg];[bg][tts]amix=inputs=2[out_audio];")
              f.write("[0:v]subtitles=vi.vtt:fontsdir=fonts:force_style='FontName=Oswald,PrimaryColour=&H00FFFF&,FontSize=33,Outline=0.4,Shadow=0.4'[out_video]")
          EOF

      - name: Build Filter
        run: |
          python3 <<EOF
          import webvtt
          vtt = webvtt.read("vi.vtt")
          with open("master_filter.txt","w") as f:
              for i,c in enumerate(vtt):
                  h,m,s = c.start.replace(',','.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                  f.write(f"[{i+1}:a]adelay={ms}|{ms}[a{i}];")
              f.write("".join(f"[a{i}]" for i in range(len(vtt))))
              f.write(f"amix=inputs={len(vtt)}:normalize=0,volume=3.0[tts];")
              f.write("[0:a]volume=0.90[bg];[bg][tts]amix=inputs=2[out_audio];")
              f.write("[0:v]subtitles=vi.vtt:fontsdir=fonts:force_style='FontName=Oswald,PrimaryColour=&H00FFFF&,FontSize=33,Outline=0.4,Shadow=0.4'[out_video]")
          EOF

      - name: Render & HLS
        run: |
          NAME= ${{ github.event.inputs.slug }}
          COUNT=$(cat count.txt)
          INPUTS="-i raw_video.mp4"
          for ((i=0; i<COUNT; i++)); do
            INPUTS="$INPUTS -i chunks/c_$i.mp3"
          done

          ffmpeg -y $INPUTS -filter_complex_script master_filter.txt \
            -map "[out_video]" -map "[out_audio]" \
            -c:v libx264 -crf 25 -preset medium -tune animation \
            -pix_fmt yuv420p -maxrate 1800k -bufsize 3000k\
            -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 \
            -c:a aac -b:a 96k -threads 0 final.mp4

          mkdir -p output
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-index.png" \
            -hls_segment_filename "output/${NAME}-index%d.png" \
            "output/${NAME}.m3u8"

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e

          BASE_URL="https://${BRANCH}.${PROJECT}.pages.dev"
          FILE_URL="${BASE_URL}/${BRANCH}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages 2
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
