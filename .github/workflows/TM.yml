name: M3U8 Download ->> Audio (Batch Processing)

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp webvtt-py edge-tts requests
          
      - name: Download Video from m3u8 Link
        run: |
          last=0
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            --retry-sleep 5 \
            --newline \
            -o "raw_video.mp4" \
            "${{ github.event.inputs.link }}" | while IFS= read -r line; do
              now=$(date +%s)
              if [ $((now - last)) -ge 10 ]; then
                echo "$line"
                last=$now
              fi
            done

      - name: Setup Subtitle Font
        run: |
          mkdir -p fonts
          curl -L https://github.com/wwwonitaku/Linux/raw/main/UVNHongHaHep_B.TTF -o fonts/UVNHongHaHep_B.TTF
          fc-cache -f fonts

      - name: Download Vietnamese Subtitle
        run: |
          CHECK_URL="https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt"
          if curl -L --fail "$CHECK_URL" -o vi_downloaded.vtt; then
            echo "[INFO] Downloaded successfully."
          else
            echo "[ERROR] Vietnamese sub not found on server!"
            exit 1
          fi

      - name: Parallel TTS & Batch Audio Merging
        run: |
          python3 <<'EOF'
          import webvtt, os, re, asyncio, edge_tts, subprocess

          BATCH_SIZE = 100  # Mỗi batch xử lý 100 câu để tránh treo RAM
          MAX_CONCURRENT_TTS = 8 

          def time_to_ms(tstr):
              h, m, s = tstr.replace(',', '.').split(':')
              return int(float(h)*3600000 + float(m)*60000 + float(s)*1000)

          def safe_text(text):
              if not text: return "..."
              return re.sub(r'\s+', ' ', text).strip()[:450]

          async def generate_tts(text, out, semaphore):
              async with semaphore:
                  for _ in range(3):
                      try:
                          tts = edge_tts.Communicate(text, voice="vi-VN-HoaiMyNeural", rate="+28%")
                          await tts.save(out)
                          if os.path.getsize(out) > 100: return True
                      except:
                          await asyncio.sleep(1)
                  subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stderr=subprocess.DEVNULL)

          async def process_batch(batch_idx, captions, semaphore):
              print(f"Processing Batch {batch_idx} ({len(captions)} lines)...")
              tasks = []
              for i, c in captions:
                  tasks.append(generate_tts(safe_text(c.text), f"chunks/c_{i}.mp3", semaphore))
              await asyncio.gather(*tasks)
              
              # Gộp Batch ngay sau khi tải xong TTS của batch đó
              inputs = []
              filter_complex = ""
              for idx, (i, c) in enumerate(captions):
                  ms = time_to_ms(c.start) + 500
                  inputs.extend(["-i", f"chunks/c_{i}.mp3"])
                  filter_complex += f"[{idx}:a]adelay={ms}|{ms}[a{idx}];"
              
              filter_complex += "".join(f"[a{idx}]" for idx in range(len(captions)))
              filter_complex += f"amix=inputs={len(captions)}:normalize=0[out]"
              
              batch_file = f"batches/batch_{batch_idx}.mp3"
              cmd = ["ffmpeg", "-y"] + inputs + ["-filter_complex", filter_complex, "-map", "[out]", "-c:a", "libmp3lame", "-b:a", "128k", batch_file]
              subprocess.run(cmd, stderr=subprocess.DEVNULL)
              print(f"Done Batch {batch_idx}")

          async def main():
              vtt = webvtt.read("vi_downloaded.vtt")
              os.makedirs("chunks", exist_ok=True)
              os.makedirs("batches", exist_ok=True)
              semaphore = asyncio.Semaphore(MAX_CONCURRENT_TTS)
              
              all_caps = list(enumerate(vtt))
              batch_tasks = []
              for i in range(0, len(all_caps), BATCH_SIZE):
                  batch_tasks.append(process_batch(i // BATCH_SIZE, all_caps[i:i+BATCH_SIZE], semaphore))
              
              await asyncio.gather(*batch_tasks)
              with open("batch_count.txt", "w") as f: f.write(str(len(batch_tasks)))

          asyncio.run(main())
          EOF

      - name: Master Audio Final Merging
        run: |
          COUNT=$(cat batch_count.txt)
          INPUTS=""
          FILTER=""
          for ((i=0; i<COUNT; i++)); do
            INPUTS="$INPUTS -i batches/batch_$i.mp3"
            FILTER="${FILTER}[$i:a]"
          done
          # Gộp các batch thành master audio duy nhất
          ffmpeg -y $INPUTS -filter_complex "${FILTER}amix=inputs=$COUNT:normalize=0[out]" -map "[out]" -c:a libmp3lame -b:a 128k tts_master.mp3

      - name: Render & HLS
        run: |
          NAME="${{ github.event.inputs.slug }}"
          # Sử dụng lại filter_complex của bạn để trộn nhạc nền và sub
          ffmpeg -y -i raw_video.mp4 -i tts_master.mp3 \
            -filter_complex "[0:a]volume=0.90[bg];[1:a]volume=3.0[tts];[bg][tts]amix=inputs=2[out_audio];[0:v]subtitles=vi_downloaded.vtt:fontsdir=fonts:force_style='FontName=UVN Hong Ha Hep,PrimaryColour=&H00FFFF&,FontSize=33,Outline=0.4,Shadow=0.4'[out_video]" \
            -map "[out_video]" -map "[out_audio]" \
            -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 -crf 23 -preset medium \
            -maxrate 2000k -bufsize 3000k \
            -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 \
            -vsync cfr -c:a aac -b:a 96k -ac 2 -threads 0 -movflags +faststart final.mp4

          mkdir -p output
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-index.png" \
            -hls_segment_filename "output/${NAME}-index%d.png" \
            "output/${NAME}.m3u8"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
