name: M3U8 Download Multi-Audio

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp webvtt-py requests edge-tts

      - name: Download Video and Subtitle
        run: |
          echo "Starting Download..."
          # Tải video raw với log 60s/lần
          yt-dlp --newline --no-warnings \
            --hls-prefer-native --concurrent-fragments 10 \
            -o "input_video.mp4" "${{ github.event.inputs.link }}" | python3 -u -c "
          import sys, re, time
          last_log = 0
          for line in sys.stdin:
              m = re.search(r'\[download\]\s+(\d+\.\d+%) of\s+([\d\.]+\w+)', line)
              if m and (time.time() - last_log > 60):
                  print(f'[Download]: {m.group(1)} | Total: {m.group(2)}')
                  last_log = time.time()
          "
          curl -L "https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt" -o "vi.vtt"
          echo "Download Completed."

      - name: Step 1 - Process TTS (AI Voices)
        run: |
          echo "Generating AI Voices (Male & Female)..."
          python3 -u <<EOF
          import asyncio, edge_tts, webvtt, os, re, subprocess

          async def generate_tts(text, out, voice, semaphore, idx, total):
              async with semaphore:
                  try:
                      await edge_tts.Communicate(text.lower(), voice=voice, rate="+28%").save(out)
                  except:
                      subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
                  if idx % 100 == 0 or idx == total:
                      print(f"[TTS Progress]: {idx}/{total} chunks", flush=True)

          async def main():
              vtt = webvtt.read("vi.vtt")
              sem = asyncio.Semaphore(15)
              for gender, voice in [("male", "vi-VN-NamMinhNeural"), ("female", "vi-VN-HoaiMyNeural")]:
                  print(f"Processing {gender} chunks...")
                  os.makedirs(f"chunks_{gender}", exist_ok=True)
                  await asyncio.gather(*[generate_tts(c.text, f"chunks_{gender}/c_{i}.mp3", voice, sem, i+1, len(vtt)) for i, c in enumerate(vtt)])
          asyncio.run(main())
          EOF

      - name: Step 2 - Master Multi-Render (Video + All Audio Tracks)
        run: |
          echo "Starting Master Render (Video Raw + 3 Audio Tracks)..."
          ulimit -n 65535
          NAME="${{ github.event.inputs.slug }}"
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 input_video.mp4)
          
          # Build Master Filter Script (Tương tự dự án cũ nhưng tách 2 luồng Nam/Nữ riêng)
          python3 <<EOF
          import webvtt
          vtt = webvtt.read("vi.vtt")
          num = len(vtt)
          with open("master_filter.txt", "w") as f:
              # Nhánh Nam (A1)
              for i in range(num):
                  h, m, s = vtt[i].start.replace(',','.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                  f.write(f"[{i+1}:a]adelay={ms}|{ms}[am{i}];")
              f.write("".join(f"[am{i}]" for i in range(num)) + f"amix=inputs={num}:normalize=0,volume=3.0[ttsm];[0:a]volume=0.9[bgm];[bgm][ttsm]amix=inputs=2[out_male];")
              
              # Nhánh Nữ (A2)
              for i in range(num):
                  h, m, s = vtt[i].start.replace(',','.').split(':')
                  ms = int(float(h)*3600000 + float(m)*60000 + float(s)*1000) + 500
                  f.write(f"[{i+num+1}:a]adelay={ms}|{ms}[af{i}];")
              f.write("".join(f"[af{i}]" for i in range(num)) + f"amix=inputs={num}:normalize=0,volume=3.0[ttsf];[0:a]volume=0.9[bgf];[bgf][ttsf]amix=inputs=2[out_female]")
          EOF

          # Gom tất cả input vào 1 danh sách
          VTT_COUNT=$(python3 -c "import webvtt; print(len(webvtt.read('vi.vtt')))")
          INPUTS="-i input_video.mp4"
          for i in $(seq 0 $((VTT_COUNT-1))); do INPUTS="$INPUTS -i chunks_male/c_$i.mp3"; done
          for i in $(seq 0 $((VTT_COUNT-1))); do INPUTS="$INPUTS -i chunks_female/c_$i.mp3"; done

          # Render 1 lần duy nhất ra 4 file kết quả
          ffmpeg -y -progress pipe:1 $INPUTS -filter_complex_script master_filter.txt \
            -map "0:v" -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 -crf 23 -preset medium -maxrate 2000k -bufsize 3000k -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 -vsync cfr -an final_video.mp4 \
            -map "[out_male]" -c:a aac -b:a 96k mixed_male.aac \
            -map "[out_female]" -c:a aac -b:a 96k mixed_female.aac \
            -map "0:a" -c:a copy original_audio.aac 2>/dev/null | python3 -u -c "
          import sys, time
          dur = float('$DURATION') * 1000000 if '$DURATION' != 'N/A' else 0
          last_log = 0
          for line in sys.stdin:
              if 'out_time_ms' in line:
                  val = line.split('=')[1].strip()
                  if val.isnumeric() and (time.time() - last_log > 60):
                      print(f'[Master Render Progress]: {min(100, (int(val)/dur)*100):.2f}%')
                      last_log = time.time()
          "

      - name: Step 3 - Segment to HLS fMP4 PNG
        run: |
          mkdir -p output
          NAME="${{ github.event.inputs.slug }}"
          echo "Starting HLS Segmentation..."
          
          # Segment Video (5s)
          ffmpeg -i final_video.mp4 -c copy -f hls -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod -hls_segment_type fmp4 -hls_fmp4_init_filename "${NAME}-v-index.png" -hls_segment_filename "output/${NAME}-v-index%d.png" "output/${NAME}-v.m3u8" -loglevel error
          
          # Segment 3 Audio (60s)
          for t in a0 a1 a2; do
            F="original_audio.aac"; [ "$t" == "a1" ] && F="mixed_male.aac"; [ "$t" == "a2" ] && F="mixed_female.aac"
            ffmpeg -i $F -c copy -f hls -hls_time 60 -hls_list_size 0 -hls_segment_type fmp4 -hls_fmp4_init_filename "${NAME}-$t-index.png" -hls_segment_filename "output/${NAME}-$t-index%d.png" "output/${NAME}-$t.m3u8" -loglevel error
          done

          # Create Master Playlist
          cat <<EOF > output/${{ github.event.inputs.slug }}.m3u8
          #EXTM3U
          #EXT-X-VERSION:4
          #EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Tiếng gốc",DEFAULT=YES,AUTOSELECT=YES,URI="$NAME-a0.m3u8"
          #EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Thuyết minh Nam",DEFAULT=NO,AUTOSELECT=YES,URI="$NAME-a1.m3u8"
          #EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio",NAME="Thuyết minh Nữ",DEFAULT=NO,AUTOSELECT=YES,URI="$NAME-a2.m3u8"
          #EXT-X-STREAM-INF:BANDWIDTH=2000000,RESOLUTION=1920x1080,AUDIO="audio"
          $NAME-v.m3u8
          EOF
          echo "All HLS Files Ready."

      - name: Deploy to Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify and Retry
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${BRANCH}.${PROJECT}.pages.dev/${BRANCH}.m3u8"
          check () { [ "$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")" = "200" ]; }
          sleep 60
          if check; then exit 0; fi
          sleep 180
          if check; then exit 0; fi
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy Retry
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
