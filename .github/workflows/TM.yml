name: M3U8 Download ->> Audio (Long Video Fixed)

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python3 -m pip install -U yt-dlp webvtt-py edge-tts requests
          
      - name: Download Video from m3u8 Link
        run: |
          last=0
          yt-dlp \
            --hls-prefer-native \
            --concurrent-fragments 5 \
            --retries infinite \
            --fragment-retries infinite \
            --retry-sleep 5 \
            --newline \
            -o "raw_video.mp4" \
            "${{ github.event.inputs.link }}" | while IFS= read -r line; do
              now=$(date +%s)
              if [ $((now - last)) -ge 10 ]; then
                echo "$line"
                last=$now
              fi
            done

      - name: Setup Subtitle Font
        run: |
          mkdir -p fonts
          curl -L https://github.com/wwwonitaku/Linux/raw/main/UVNHongHaHep_B.TTF -o fonts/UVNHongHaHep_B.TTF
          fc-cache -f fonts

      - name: Download Vietnamese Subtitle
        run: |
          CHECK_URL="https://vicdn.cc/vtt/${{ github.event.inputs.slug }}-vi.vtt"
          if curl -L --fail "$CHECK_URL" -o vi_downloaded.vtt; then
            echo "[INFO] Downloaded successfully."
          else
            echo "[ERROR] Vietnamese sub not found on server!"
            exit 1
          fi

      - name: TTS Generation & List Creation
        run: |
          python3 <<'EOF'
          import webvtt, os, re, asyncio, edge_tts, subprocess

          MAX_CONCURRENT_TTS = 5

          def time_to_sec(tstr):
              # Chuyển 00:00:00.000 sang giây
              h, m, s = tstr.replace(',', '.').split(':')
              return float(h)*3600 + float(m)*60 + float(s)

          def safe_text(text, max_len=450):
              if not text: return "..."
              text = re.sub(r'\s+', ' ', text).strip()
              return text if len(text) <= max_len else text[:max_len] + "..."

          def normalize_for_tts(text):
              text = text.lower()
              text = re.sub(r'\s+', ' ', text).strip()
              text = text.replace(",", ", ").replace(".", ". ").replace("?", "? ").replace("!", "! ")
              if not text.endswith((".", "!", "?", "...")): text += "."
              return text

          async def generate_tts(text, out, semaphore):
              async with semaphore:
                  tts_text = normalize_for_tts(text)
                  for attempt in range(2):
                      try:
                          tts = edge_tts.Communicate(tts_text, voice="vi-VN-HoaiMyNeural", rate="+28%")
                          await tts.save(out)
                          if os.path.exists(out) and os.path.getsize(out) > 100:
                              return True
                      except:
                          await asyncio.sleep(2)
                  # Nếu lỗi, tạo file im lặng 0.1s làm placeholder
                  subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","0.1",out], stderr=subprocess.DEVNULL)
                  return False

          async def main():
              vtt = webvtt.read("vi_downloaded.vtt")
              os.makedirs("chunks", exist_ok=True)
              
              # Tạo file im lặng gốc
              subprocess.run(["ffmpeg","-y","-f","lavfi","-i","anullsrc=r=24000:cl=mono","-t","1","silence_1s.mp3"], stderr=subprocess.DEVNULL)
              silence_path = os.path.abspath("silence_1s.mp3")
              
              semaphore = asyncio.Semaphore(MAX_CONCURRENT_TTS)
              tasks = []
              for i, c in enumerate(vtt):
                  tasks.append(generate_tts(safe_text(c.text), f"chunks/c_{i}.mp3", semaphore))
              
              print(f"Starting TTS for {len(vtt)} lines...")
              await asyncio.gather(*tasks)

              # Ghi file concat_list với đường dẫn tuyệt đối
              with open("concat_list.txt", "w") as f:
                  prev_end = 0.0
                  for i, c in enumerate(vtt):
                      start_sec = time_to_sec(c.start)
                      gap = start_sec - prev_end
                      
                      if gap > 0:
                          f.write(f"file '{silence_path}'\n")
                          f.write(f"duration {gap}\n")
                      
                      chunk_path = os.path.abspath(f"chunks/c_{i}.mp3")
                      f.write(f"file '{chunk_path}'\n")
                      
                      # Ước tính thời điểm kết thúc câu tiếp theo
                      # Lưu ý: Concat demuxer sẽ tự nối tiếp, 
                      # chúng ta chỉ cần chèn gap giữa các điểm bắt đầu.
                      prev_end = start_sec + 0.05 # Một khoảng bù siêu nhỏ

          asyncio.run(main())
          EOF

      - name: Master Audio Merging
        run: |
          # Ghép toàn bộ audio và khoảng lặng theo danh sách (Cực nhẹ RAM)
          ffmpeg -y -f concat -safe 0 -i concat_list.txt -c:a libmp3lame -b:a 128k tts_master.mp3

      - name: Render & HLS
        run: |
          NAME="${{ github.event.inputs.slug }}"
          # Burn sub và mix audio master vào video gốc
          ffmpeg -y -i raw_video.mp4 -i tts_master.mp3 \
            -filter_complex "[0:a]volume=0.9[bg];[1:a]volume=3.0[tts];[bg][tts]amix=inputs=2:duration=first[out_audio];[0:v]subtitles=vi_downloaded.vtt:fontsdir=fonts:force_style='FontName=UVN Hong Ha Hep,PrimaryColour=&H00FFFF&,FontSize=33,Outline=0.4,Shadow=0.4'[out_video]" \
            -map "[out_video]" -map "[out_audio]" \
            -c:v libx264 -pix_fmt yuv420p -profile:v high -level 4.1 -crf 23 -preset medium \
            -maxrate 2000k -bufsize 3000k \
            -force_key_frames "expr:gte(t,n_forced*5)" -sc_threshold 0 \
            -vsync cfr -c:a aac -b:a 96k -ac 2 -threads 0 -movflags +faststart final.mp4

          mkdir -p output
          ffmpeg -i final.mp4 -c copy -f hls \
            -hls_time 5 -hls_list_size 0 -start_number 10001 -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "${NAME}-index.png" \
            -hls_segment_filename "output/${NAME}-index%d.png" \
            "output/${NAME}.m3u8"

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          BASE_URL="https://${BRANCH}.${PROJECT}.pages.dev"
          FILE_URL="${BASE_URL}/${BRANCH}.m3u8"
          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            [ "$code" = "200" ]
          }
          sleep 60
          if check; then exit 0; fi
          sleep 180
          if check; then exit 0; fi
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages 2
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
